<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0D14"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1" fill="#3B82F6" opacity="0.15"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo -->
  <rect x="80" y="255" width="110" height="110" rx="24" fill="url(#accent)"/>
  <text x="135" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="38" font-weight="900" fill="white">WIN</text>
  <!-- Brand -->
  <text x="230" y="300" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="900" fill="white">WinWithTovy</text>
  <text x="230" y="345" font-family="ui-monospace,monospace" font-size="22" fill="#9CA3AF" letter-spacing="4">V12 GOD-ENGINE  //  SPORTS INTELLIGENCE</text>
  <!-- Stats bar -->
  <rect x="80" y="420" width="1040" height="80" rx="16" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="200" y="470" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="900" fill="#FACC15">SHARP MONEY</text>
  <text x="460" y="470" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="900" fill="#3B82F6">EV SIGNALS</text>
  <text x="720" y="470" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="900" fill="#10B981">PREDICTIONS</text>
  <text x="980" y="470" text-anchor="middle" font-family="system-ui" font-size="28" font-weight="900" fill="#8B5CF6">PARLAYS</text>
  <line x1="330" y1="435" x2="330" y2="485" stroke="#1E293B" stroke-width="1"/>
  <line x1="590" y1="435" x2="590" y2="485" stroke="#1E293B" stroke-width="1"/>
  <line x1="850" y1="435" x2="850" y2="485" stroke="#1E293B" stroke-width="1"/>
  <text x="600" y="575" text-anchor="middle" font-family="ui-monospace,monospace" font-size="16" fill="#6B7280" letter-spacing="6">@WINWITHTOVY  //  OMNISCIENCE V12</text>
  <rect x="0" y="626" width="1200" height="4" fill="url(#gold)"/>
